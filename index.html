<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans+JP:wght@300;400;500;600&family=Zen+Old+Mincho:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google翻訳を完全無効化 -->
    <meta name="google" content="notranslate" />

    <!-- ===== SEO Core ===== -->
    <title>BLACK PAPILLON — Tattoo Studio Concept / 治癒後の仕上がりで選ぶ</title>
    <meta
      name="description"
      content="BLACK PAPILLON（架空ブランド）— 治癒後の仕上がりを基準に、FINE LINE / BLACK & GREY / COVERUP を提示するタトゥースタジオのコンセプトサイト。予約導線はDM・メール・電話に対応。"
    />
    <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Canonical（検索の主役URLを固定） -->
    <link rel="canonical" href="https://blackpapillon.example/" />

    <!-- Author / Creator（本拠地へプラス） -->
    <meta name="author" content="Yuto Gushiken" />
    <link rel="author" href="https://gushikendesign.com/" />

    <!-- ===== Open Graph ===== -->
    <meta property="og:locale" content="ja_JP" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BLACK PAPILLON" />
    <meta property="og:title" content="BLACK PAPILLON — Tattoo Studio Concept" />
    <meta
      property="og:description"
      content="治癒後の仕上がりを基準に、相性が分かる。FINE LINE / BLACK & GREY / COVERUP。"
    />
    <meta property="og:url" content="https://blackpapillon.example/" />
    <meta property="og:image" content="https://blackpapillon.example/ogp.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- ===== Twitter Card ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BLACK PAPILLON — Tattoo Studio Concept" />
    <meta
      name="twitter:description"
      content="治癒後の仕上がりを基準に、相性が分かる。FINE LINE / BLACK & GREY / COVERUP。"
    />
    <meta name="twitter:image" content="https://blackpapillon.example/ogp.jpg" />

    <!-- Theme -->
    <meta name="theme-color" content="#07080A" />
    <meta name="color-scheme" content="dark" />

    <!-- ===== Structured Data (嘘にならない型) ===== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://blackpapillon.example/#website",
            "url": "https://blackpapillon.example/",
            "name": "BLACK PAPILLON",
            "description": "Tattoo Studio Concept site (fictional brand) focusing on healed quality.",
            "inLanguage": "ja-JP",
            "creator": {
              "@type": "Person",
              "name": "Yuto Gushiken",
              "url": "https://gushikendesign.com/"
            }
          },
          {
            "@type": "WebPage",
            "@id": "https://blackpapillon.example/#webpage",
            "url": "https://blackpapillon.example/",
            "name": "BLACK PAPILLON — Tattoo Studio Concept",
            "isPartOf": { "@id": "https://blackpapillon.example/#website" },
            "inLanguage": "ja-JP"
          },
          {
            "@type": "CreativeWork",
            "name": "BLACK PAPILLON — Tattoo Studio Concept Site",
            "url": "https://blackpapillon.example/",
            "genre": ["Web Design", "Brand Concept", "UI/UX"],
            "keywords": ["tattoo", "fine line", "black and grey", "coverup", "healed"],
            "creator": {
              "@type": "Person",
              "name": "Yuto Gushiken",
              "url": "https://gushikendesign.com/"
            },
            "isBasedOn": "Fictional brand concept for portfolio work"
          }
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
